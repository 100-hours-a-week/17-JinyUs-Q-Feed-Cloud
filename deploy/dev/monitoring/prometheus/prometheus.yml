# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  # - "rules/*.yml"

scrape_configs:
  # ---------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ---------------------------------------------------------
  # Monitoring EC2 Alloy (host metrics, same Docker network)
  # ---------------------------------------------------------
  - job_name: "alloy-monitoring"
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          environment: "dev"
          role: "monitoring"

  # ---------------------------------------------------------
  # Backend (Spring Boot Actuator + Micrometer)
  # ---------------------------------------------------------
  - job_name: "backend"
    metrics_path: /actuator/prometheus
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8081
        filters:
          - name: tag:Role
            values: ["backend"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment

  # ---------------------------------------------------------
  # AI (FastAPI + prometheus_fastapi_instrumentator)
  # ---------------------------------------------------------
  - job_name: "ai"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8000
        filters:
          - name: tag:Role
            values: ["ai"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment

  # ---------------------------------------------------------
  # Alloy host metrics (Backend/AI EC2)
  # ---------------------------------------------------------
  - job_name: "alloy"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 12345
        filters:
          - name: tag:Role
            values: ["backend", "ai", "redis"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment

  # ---------------------------------------------------------
  # Redis Exporter
  # ---------------------------------------------------------
  - job_name: "redis"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9121
        filters:
          - name: tag:Role
            values: ["redis"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment
